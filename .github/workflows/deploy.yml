name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feat/github-pages-deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Swap server actions with demo stubs
        run: |
          cp src/features/checkout/actions.stub.ts src/features/checkout/actions.ts
          cp src/features/auth/actions.stub.ts src/features/auth/actions.ts
          cp src/features/admin-products-crud/actions.stub.ts src/features/admin-products-crud/actions.ts
          cp src/features/admin-news-crud/actions.stub.ts src/features/admin-news-crud/actions.ts
          cp src/features/admin-users-crud/actions.stub.ts src/features/admin-users-crud/actions.ts
          cp src/features/admin-orders-crud/actions.stub.ts src/features/admin-orders-crud/actions.ts
          cp src/app/auth/login/actions.stub.ts src/app/auth/login/actions.ts

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_USE_MOCK: "true"
          NEXT_PUBLIC_BASE_PATH: "/sweets-of-life-next"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
